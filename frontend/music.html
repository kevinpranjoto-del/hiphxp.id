<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cari Musik — hiphxp.id</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Work+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      background: var(--ink) !important;
      color: var(--paper) !important;
    }
    .music-page {
      padding-top: 80px;
      min-height: calc(100vh - 100px);
      padding-bottom: 120px; /* space for player */
    }
    
    .search-box {
      width: 100%;
      max-width: 600px;
      margin: 0 auto 40px;
      position: relative;
    }
    
    .search-input {
      width: 100%;
      padding: 16px 24px;
      border-radius: 30px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: var(--white);
      font-size: 18px;
      font-family: 'Work Sans', sans-serif;
      transition: all 0.3s ease;
    }
    
    .search-input:focus {
      outline: none;
      border-color: var(--red);
      background: rgba(255,255,255,0.1);
    }
    
    .search-icon {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
    }

    .song-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 800px;
      margin: 0 auto;
    }

    .song-row {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      transition: background 0.2s;
      cursor: pointer;
    }
    
    .song-row:hover {
      background: rgba(255,255,255,0.08);
    }
    
    .song-row.playing {
      border: 1px solid var(--red);
      background: rgba(219, 10, 10, 0.1);
    }

    .song-cover {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      background: #333;
      margin-right: 16px;
      object-fit: cover;
    }

    .song-info {
      flex: 1;
    }

    .song-info h4 {
      margin: 0;
      font-size: 16px;
    }
    
    .song-info span {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--grey);
    }

    .play-btn-list {
      background: transparent;
      border: 1px solid var(--red);
      color: var(--red);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    
    .song-row:hover .play-btn-list {
      background: var(--red);
      color: var(--white);
    }

    /* Player Footer */
    .player-footer {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: rgba(18, 18, 18, 0.95);
      backdrop-filter: blur(10px);
      border-top: 1px solid rgba(255,255,255,0.1);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transform: translateY(100%);
      transition: transform 0.3s ease;
      z-index: 100;
    }

    .player-footer.active {
      transform: translateY(0);
    }

    .player-info {
      display: flex;
      align-items: center;
      width: 300px;
    }

    .player-cover {
      width: 56px;
      height: 56px;
      border-radius: 8px;
      margin-right: 16px;
      background: #333;
      object-fit: cover;
    }

    .player-text h4 {
      margin: 0 0 4px 0;
      font-size: 16px;
    }
    .player-text span {
      color: var(--grey);
      font-size: 13px;
    }

    .player-controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      max-width: 500px;
    }

    .player-buttons {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 8px;
    }

    .btn-icon {
      background: none;
      border: none;
      color: var(--white);
      cursor: pointer;
      opacity: 0.7;
      transition: opacity 0.2s;
      padding: 4px;
    }
    .btn-icon:hover { opacity: 1; }
    
    .btn-play {
      background: var(--white);
      color: var(--bg);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 1;
      border: none;
      cursor: pointer;
    }

    .progress-container {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--grey);
    }

    .progress-bar-bg {
      flex: 1;
      height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
      cursor: pointer;
      position: relative;
    }

    .progress-bar-fill {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      background: var(--red);
      border-radius: 2px;
      width: 0%;
      pointer-events: none;
    }

    .volume-container {
      width: 300px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
    }

    .volume-slider {
      width: 100px;
      height: 4px;
      -webkit-appearance: none;
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
      outline: none;
    }
    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--white);
      cursor: pointer;
    }
  </style>
</head>
<body>

      <span class="mark-word">hiphxp<span class="dot">.</span>id</span>
    </a>
    <nav class="primary">
      <a href="index.html#musik">Musik</a>
      <a href="index.html#lifestyle">Lifestyle</a>
      <a href="index.html#fitur">Features</a>
      <a href="index.html#community">Community Hub</a>
      <a href="index.html#kerjasama">Kerja Sama</a>
    </nav>
    <div class="header-actions" style="display: flex; gap: 12px; align-items: center;">
      <a href="music.html" class="btn-cta" style="background: transparent; color: var(--paper); border: 1.5px solid rgba(242,241,236,0.3); clip-path: none; border-radius: 4px;">Cari Lagu</a>
      <a href="login.html" class="btn-cta">Portal Musisi</a>

      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>

</header>

<div class="music-page wrap">
  <div style="text-align: center; margin-bottom: 40px; display: block;">
    <h1 class="display" style="font-size: clamp(30px, 4vw, 48px); margin-bottom: 12px;">Cari Musik</h1>
    <p style="color: var(--grey);">Temukan rilisan terbaru dari musisi lokal favoritmu.</p>
  </div>

  <div class="search-box">
    <input type="text" id="search-input" class="search-input" placeholder="Cari judul lagu atau nama musisi...">
    <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
  </div>

  <div id="search-results" class="song-list">
    <div class="loading-spinner">Mencari lagu...</div>
  </div>
</div>

<!-- PLAYER COMPONENT -->
<div id="player-footer" class="player-footer">
  <div class="player-info">
    <img id="player-cover" src="" alt="Cover" class="player-cover" style="display:none">
    <div class="player-cover" id="player-cover-placeholder"></div>
    <div class="player-text">
      <h4 id="player-title">Pilih Lagu</h4>
      <span id="player-artist">...</span>
    </div>
  </div>

  <div class="player-controls">
    <div class="player-buttons">
      <button class="btn-icon" id="btn-prev" aria-label="Previous">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
      </button>
      <button class="btn-play" id="btn-play" aria-label="Play/Pause">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" id="icon-play"><path d="M8 5v14l11-7z"/></svg>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" id="icon-pause" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
      <button class="btn-icon" id="btn-next" aria-label="Next">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
      </button>
    </div>
    <div class="progress-container">
      <span id="time-current">0:00</span>
      <div class="progress-bar-bg" id="progress-bg">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
      <span id="time-total">0:00</span>
    </div>
  </div>

  <div class="volume-container">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="color:var(--grey)"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
    <input type="range" id="volume-slider" class="volume-slider" min="0" max="1" step="0.01" value="1">
  </div>
  
  <!-- Hidden HTML5 Audio Element -->
  <audio id="audio-element"></audio>
</div>

<!-- Toast -->
<div id="toast" class="toast" role="alert" aria-live="polite"></div>
