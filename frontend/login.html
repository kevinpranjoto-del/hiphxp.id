<main id="app-content">


<div class="auth-page">
  <div class="auth-box">
    <div class="auth-tabs">
      <button class="auth-tab active" data-target="login">Login</button>
      <button class="auth-tab" data-target="register">Daftar</button>
    </div>

    <!-- Login Form -->
    <form id="login-form" class="auth-form active">
      <div class="field">
        <label>Email</label>
        <input type="email" id="login-email" required>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="login-password" required>
      </div>
      <button type="submit" class="btn primary" style="width:100%; margin-top:16px;">Masuk ke Dashboard</button>
    </form>

    <!-- Register Form -->
    <form id="register-form" class="auth-form">
      <div class="field">
        <label>Nama Alias / Musisi (Required)</label>
        <input type="text" id="reg-artist-name" required>
      </div>
      <div class="field">
        <label>Nama Asli (Required)</label>
        <input type="text" id="reg-real-name" required>
      </div>
      <div class="field">
        <label>Email (Required)</label>
        <input type="email" id="reg-email" required>
      </div>
      <div class="field">
        <label>Password (Required)</label>
        <input type="password" id="reg-password" required>
      </div>
      
      <div style="margin: 20px 0; border-top: 1px dashed rgba(255,255,255,0.2); padding-top: 20px;">
        <span class="mono" style="color:var(--grey); display:block; margin-bottom:12px;">Data Tambahan (Opsional)</span>
        
        <div class="field">
          <label>Kota Asal</label>
          <input type="text" id="reg-city">
        </div>
        <div class="field">
          <label>WhatsApp</label>
          <input type="text" id="reg-wa">
        </div>
        <div class="field">
          <label>Instagram URL</label>
          <input type="url" id="reg-ig">
        </div>
        <div class="field">
          <label>Spotify Artist URL</label>
          <input type="url" id="reg-spotify">
        </div>
      </div>

      <button type="submit" class="btn outline" style="width:100%; margin-top:16px;">Buat Akun</button>
    </form>
  </div>
</div>

</main>
<!-- PLAYER COMPONENT -->
<div id="player-footer" class="player-footer">
  <div class="player-info">
    <img id="player-cover" src="" alt="Cover" class="player-cover" style="display:none">
    <div class="player-cover" id="player-cover-placeholder"></div>
    <div class="player-text">
      <h4 id="player-title">Pilih Lagu</h4>
      <span id="player-artist">...</span>
    </div>
  </div>

  <div class="player-controls">
    <div class="player-buttons">
      <button class="btn-icon" id="btn-prev" aria-label="Previous">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
      </button>
      <button class="btn-play" id="btn-play" aria-label="Play/Pause">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" id="icon-play"><path d="M8 5v14l11-7z"/></svg>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" id="icon-pause" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
      <button class="btn-icon" id="btn-next" aria-label="Next">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
      </button>
    </div>
    <div class="progress-container">
      <span id="time-current">0:00</span>
      <div class="progress-bar-bg" id="progress-bg">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
      <span id="time-total">0:00</span>
    </div>
  </div>

  <div class="volume-container">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="color:var(--grey)"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
    <input type="range" id="volume-slider" class="volume-slider" min="0" max="1" step="0.01" value="1">
  </div>
  
  <!-- Hidden HTML5 Audio Element -->
  <audio id="audio-element"></audio>
</div>

<!-- Toast -->
<div id="toast" class="toast" role="alert" aria-live="polite"></div>
