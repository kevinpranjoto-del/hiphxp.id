<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Musisi — hiphxp.id</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Work+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      background: var(--ink) !important;
      color: var(--paper) !important;
    }
    .auth-page {
      min-height: calc(100vh - 74px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 120px 20px 40px;
    }
    .auth-box {
      width: 100%;
      max-width: 500px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 40px;
    }
    .auth-tabs {
      display: flex;
      gap: 16px;
      margin-bottom: 30px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 16px;
    }
    .auth-tab {
      background: none;
      border: none;
      color: var(--grey);
      font-family: 'Archivo Black', sans-serif;
      font-size: 20px;
      cursor: pointer;
      text-transform: uppercase;
      padding: 0;
    }
    .auth-tab.active {
      color: var(--paper);
    }
    .auth-form {
      display: none;
      margin-top: 24px;
    }
    .auth-form.active {
      display: block;
    }
    
    /* Form input styling */
    .field {
      margin-bottom: 20px;
    }
    .field label {
      display: block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11.5px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(242,241,236,0.6);
      margin-bottom: 8px;
    }
    .field input {
      width: 100%;
      background: rgba(0,0,0,0.2);
      border: 1.5px solid rgba(242,241,236,0.15);
      color: var(--paper);
      padding: 14px 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      border-radius: 8px;
      transition: border-color .2s, background .2s;
    }
    .field input:focus {
      outline: none;
      border-color: var(--red);
      background: rgba(0,0,0,0.4);
    }
    
    /* Button styles */
    .btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12.5px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 16px;
      border-radius: 8px;
      cursor: pointer;
      border: none;
      font-weight: 700;
      transition: opacity .2s, transform .1s;
    }
    .btn:active {
      transform: scale(0.98);
    }
    .btn.primary {
      background: var(--red);
      color: var(--paper);
    }
    .btn.primary:hover {
      opacity: 0.9;
    }
    .btn.outline {
      background: transparent;
      border: 1.5px solid var(--paper);
      color: var(--paper);
    }
    .btn.outline:hover {
      background: var(--paper);
      color: var(--ink);
    }
  </style>
</head>
<body>

<!-- ============ MOBILE MENU ============ -->
<div id="mobile-menu" class="mobile-menu" role="dialog" aria-modal="true" aria-label="Navigasi utama">
  <button id="mobile-close" class="mobile-close" aria-label="Tutup menu">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round">
      <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  </button>
  <a href="index.html#musik">Musik</a>
  <a href="index.html#lifestyle">Lifestyle</a>
  <a href="index.html#fitur">Features</a>
  <a href="index.html#community">Community Hub</a>
  <a href="index.html#kerjasama">Kerja Sama</a>
  <a href="index.html#kontak">Kontak</a>
  <a href="music.html">Cari Lagu</a>
</div>

<header class="site">
  <div class="wrap">
    <a href="index.html" class="mark">
      <svg width="34" height="34" viewBox="0 0 100 100" fill="none"><rect x="6" y="6" width="88" height="88" fill="none" stroke="#f2f1ec" stroke-width="7"/><g stroke="#f2f1ec" stroke-width="9"><path d="M22 20 L22 80"/><path d="M37 20 L28 80"/><path d="M52 20 L52 80"/><path d="M67 32 L58 80"/><path d="M78 44 L78 80"/></g></svg>
      <span class="mark-word">hiphxp<span class="dot">.</span>id</span>
    </a>
    <nav class="primary">
      <a href="index.html#musik">Musik</a>
      <a href="index.html#lifestyle">Lifestyle</a>
      <a href="index.html#fitur">Features</a>
      <a href="index.html#community">Community Hub</a>
      <a href="index.html#kerjasama">Kerja Sama</a>
    </nav>
    <div class="header-actions" style="display: flex; gap: 12px; align-items: center;">
      <a href="music.html" class="btn-cta" style="background: transparent; color: var(--paper); border: 1.5px solid rgba(242,241,236,0.3); clip-path: none; border-radius: 4px;">Cari Lagu</a>
      <a href="index.html" class="btn-cta">Kembali ke Beranda</a>
    </div>
    <button id="nav-hamburger" class="nav-hamburger" aria-label="Buka menu">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
  </div>
</header>

<div class="auth-page">
  <div class="auth-box">
    <div class="auth-tabs">
      <button class="auth-tab active" data-target="login">Login</button>
      <button class="auth-tab" data-target="register">Daftar</button>
    </div>

    <!-- Login Form -->
    <form id="login-form" class="auth-form active">
      <div class="field">
        <label>Email</label>
        <input type="email" id="login-email" required>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="login-password" required>
      </div>
      <button type="submit" class="btn primary" style="width:100%; margin-top:16px;">Masuk ke Dashboard</button>
    </form>

    <!-- Register Form -->
    <form id="register-form" class="auth-form">
      <div class="field">
        <label>Nama Alias / Musisi (Required)</label>
        <input type="text" id="reg-artist-name" required>
      </div>
      <div class="field">
        <label>Nama Asli (Required)</label>
        <input type="text" id="reg-real-name" required>
      </div>
      <div class="field">
        <label>Email (Required)</label>
        <input type="email" id="reg-email" required>
      </div>
      <div class="field">
        <label>Password (Required)</label>
        <input type="password" id="reg-password" required>
      </div>
      
      <div style="margin: 20px 0; border-top: 1px dashed rgba(255,255,255,0.2); padding-top: 20px;">
        <span class="mono" style="color:var(--grey); display:block; margin-bottom:12px;">Data Tambahan (Opsional)</span>
        
        <div class="field">
          <label>Kota Asal</label>
          <input type="text" id="reg-city">
        </div>
        <div class="field">
          <label>WhatsApp</label>
          <input type="text" id="reg-wa">
        </div>
        <div class="field">
          <label>Instagram URL</label>
          <input type="url" id="reg-ig">
        </div>
        <div class="field">
          <label>Spotify Artist URL</label>
          <input type="url" id="reg-spotify">
        </div>
      </div>

      <button type="submit" class="btn outline" style="width:100%; margin-top:16px;">Buat Akun</button>
    </form>
  </div>
</div>

<div id="toast" class="toast" role="alert" aria-live="polite"></div>

<script type="module">
  import { loginMusician, registerMusician } from './js/api.js';

  const tabs = document.querySelectorAll('.auth-tab');
  const forms = document.querySelectorAll('.auth-form');

  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      tabs.forEach(t => t.classList.remove('active'));
      forms.forEach(f => f.classList.remove('active'));
      
      tab.classList.add('active');
      document.getElementById(`${tab.dataset.target}-form`).classList.add('active');
    });
  });

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // Redirect if already logged in
  if (localStorage.getItem('access_token')) {
    window.location.href = 'dashboard.html';
  }

  // Login
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('login-email').value;
    const pass = document.getElementById('login-password').value;
    
    try {
      const res = await loginMusician(email, pass);
      if (res.accessToken) {
        localStorage.setItem('access_token', res.accessToken);
        window.location.href = 'dashboard.html';
      } else {
        showToast(res.message || 'Login gagal.');
      }
    } catch (err) {
      showToast('Terjadi kesalahan pada sistem.');
    }
  });

  // Register
  document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const data = {
      artistName: document.getElementById('reg-artist-name').value,
      realName: document.getElementById('reg-real-name').value,
      email: document.getElementById('reg-email').value,
      password: document.getElementById('reg-password').value,
      city: document.getElementById('reg-city').value,
      whatsapp: document.getElementById('reg-wa').value,
      instagram: document.getElementById('reg-ig').value,
      spotifyArtistUrl: document.getElementById('reg-spotify').value,
    };
    
    try {
      const res = await registerMusician(data);
      if (res.user) {
        showToast('Pendaftaran berhasil! Silakan login.');
        document.querySelector('[data-target="login"]').click();
        document.getElementById('login-email').value = data.email;
        document.getElementById('login-password').value = data.password;
      } else {
        showToast(res.message || 'Pendaftaran gagal.');
      }
    } catch (err) {
      showToast('Email mungkin sudah terdaftar atau terjadi kesalahan.');
    }
  });

  // Mobile menu script
  const mobileOpen = document.getElementById('mobile-open');
  const mobileClose = document.getElementById('mobile-close');
  const mobileMenu = document.getElementById('mobile-menu');
  if (mobileOpen && mobileClose && mobileMenu) {
    mobileOpen.addEventListener('click', () => mobileMenu.classList.add('open'));
    mobileClose.addEventListener('click', () => mobileMenu.classList.remove('open'));
    mobileMenu.querySelectorAll('a').forEach(a => {
      a.addEventListener('click', () => mobileMenu.classList.remove('open'));
    });
  }
</script>
</body>
</html>
