
services:
  db:
    image: postgres:15-alpine
    container_name: postgres-hiphxp
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hiphxp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hiphxp"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: web-hiphxp
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/hiphxp?schema=public
      - PORT=4000
      - NODE_ENV=production
      - JWT_ACCESS_SECRET=change_me_access_secret
      - JWT_REFRESH_SECRET=change_me_refresh_secret
      - JWT_ACCESS_EXPIRES_IN=15m
      - JWT_REFRESH_EXPIRES_IN=7d
      - CORS_ORIGIN=http://localhost:3000
      - RATE_LIMIT_WINDOW_MS=900000
      - RATE_LIMIT_MAX=100
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
